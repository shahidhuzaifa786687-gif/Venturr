<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Venturr — Sell</title>
  <meta name="description" content="Create a student listing on Venturr in seconds." />
  <meta name="theme-color" content="#0a0f1a" />
  <link rel="icon" href="../venturr-logo.png" type="image/png" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <a class="brand" href="../index.html" aria-label="Venturr Home">
        <img class="brand__logo" src="../venturr-logo.png" alt="Venturr" />
        <span class="brand__name">Venturr</span>
      </a>
      <div class="topbar__actions">
        <a class="btn btn--ghost" href="../index.html">Home</a>
        <a class="btn btn--ghost" href="market.html#market">Market</a>
        <a class="btn btn--ghost" href="sell.html#sell" aria-current="page">Sell</a>
        <a class="btn btn--ghost" href="about.html#about">About</a>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="section section--alt" id="sell">
      <div class="container">
        <div class="section__header">
          <div>
            <h2>Create a listing</h2>
            <p class="muted">Add your product details. Listings are saved in your browser.</p>
          </div>
        </div>
        <form class="form" id="listingForm">
          <div class="form__row">
            <label>Product name<input required name="title" placeholder="e.g., iPhone case" maxlength="80" /></label>
            <label>Category<select name="category" required>
              <option value="electronics">📱 Electronics</option>
              <option value="fashion">👕 Fashion</option>
              <option value="books">📚 Books</option>
              <option value="home">🏠 Home</option>
              <option value="services">🎓 Services</option>
            </select></label>
          </div>
          <div class="form__row">
            <label>Price (USD)<input required name="price" type="number" min="0" step="0.01" placeholder="e.g., 15.99" /></label>
            <label>Seller name<input required name="seller" placeholder="e.g., Alex" maxlength="40" /></label>
          </div>
          <label class="form__full">Description<textarea name="description" required rows="4" placeholder="What makes your product great?" maxlength="500"></textarea></label>
          <div class="form__row">
            <label>Location (optional)<input name="location" placeholder="e.g., Engineering Block" maxlength="60" /></label>
            <label>Contact (optional)<input name="contact" type="email" placeholder="e.g., alex@email.com" /></label>
          </div>
          <div class="form__actions">
            <button class="btn btn--primary" type="submit">Publish listing</button>
            <button class="btn btn--ghost" type="button" id="clearListings">Clear my listings</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div>
        <div class="brand brand--footer">
          <img class="brand__logo" src="../venturr-logo.png" alt="" />
          <span class="brand__name">Venturr</span>
        </div>
        <p class="muted">© <span id="year"></span> Venturr.</p>
      </div>
      <div class="footer__right">
        <a href="../index.html">Home</a>
        <a href="market.html">Market</a>
        <a href="about.html">About</a>
      </div>
    </div>
  </footer>
  <script src="../app.js"></script>
</body>
</html>
